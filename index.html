<script>
// ========== STORAGE KEYS ==========
const K = { R: 'mfd_roster', S: 'mfd_staff', A: 'mfd_admins', MP: 'mfd_pin', SHARED: 'shared_roster_url', GD: 'gd_token' };
const load = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d } catch { return d } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); return true } catch { return false } };

let GD_TOKEN = null;
let currentUser = '', currentRole = 'obs';
let isAdmin = false, isMaster = false;

// ========== ROSTER & STAFF ==========
function getRoster() { return load(K.R, { obs: [], fore: [], sdm: [] }); }
function saveRoster(r) { return save(K.R, r); }
function getStaff() { return load(K.S, { obs: [], fore: [], sdm: [] }); }
function saveStaff(s) { return save(K.S, s); }
function getSharedUrl() { return load(K.SHARED, ''); }

// ========== DRIVE OAUTH (admin only) ==========
function initDriveAuth() {
  const clientId = prompt("Enter your Google OAuth Client ID (from Google Cloud Console):");
  if (!clientId) return;
  const redirectUri = window.location.href.split('?')[0].split('#')[0];
  const scope = 'https://www.googleapis.com/auth/drive.readonly';
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(clientId)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(scope)}&prompt=select_account`;
  window.location.href = url;
}

function handleOAuthRedirect() {
  const hash = window.location.hash;
  if (hash && hash.includes('access_token=')) {
    const token = new URLSearchParams(hash.slice(1)).get('access_token');
    if (token) {
      GD_TOKEN = token;
      save(K.GD, token);
      history.replaceState(null, '', window.location.pathname);
      toast('Drive connected', 'info');
      scanDriveFolder();
    }
  } else {
    GD_TOKEN = load(K.GD, null);
    if (GD_TOKEN) scanDriveFolder();
  }
}

async function scanDriveFolder() {
  if (!GD_TOKEN) return;
  const listDiv = document.getElementById('drive-file-list');
  if (!listDiv) return;
  listDiv.innerHTML = '<div class="spinner"></div> Searching for "Roster" folder...';
  try {
    // Find folder named "Roster"
    const folderResp = await fetch('https://www.googleapis.com/drive/v3/files?q=name="Roster" and mimeType="application/vnd.google-apps.folder" and trashed=false&fields=files(id,name)', {
      headers: { Authorization: `Bearer ${GD_TOKEN}` }
    });
    const folderData = await folderResp.json();
    if (!folderData.files || folderData.files.length === 0) throw new Error('No folder named "Roster" found.');
    const folderId = folderData.files[0].id;
    // List xlsx files in that folder
    const filesResp = await fetch(`https://www.googleapis.com/drive/v3/files?q="${folderId}" in parents and trashed=false and (name contains ".xlsx" or name contains ".xls")&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc`, {
      headers: { Authorization: `Bearer ${GD_TOKEN}` }
    });
    const filesData = await filesResp.json();
    const files = filesData.files || [];
    if (files.length === 0) throw new Error('No Excel files found in Roster folder.');
    listDiv.innerHTML = '<div style="font-weight:700;margin-bottom:8px">📁 Select the current month\'s roster:</div>';
    files.forEach(file => {
      const btn = document.createElement('button');
      btn.textContent = `📊 ${file.name} (${new Date(file.modifiedTime).toLocaleDateString()})`;
      btn.className = 'btn-o btn-sm';
      btn.style.margin = '4px';
      btn.onclick = () => useDriveFile(file.id, file.name);
      listDiv.appendChild(btn);
    });
  } catch (err) {
    listDiv.innerHTML = `<div style="color:var(--red)">❌ ${err.message}</div>`;
  }
}

async function useDriveFile(fileId, fileName) {
  toast('Preparing public link...', 'info');
  // We cannot directly fetch xlsx from Drive without token, so we instruct admin to publish the sheet
  const publicCsvUrl = `https://docs.google.com/spreadsheets/d/${fileId}/export?format=csv`;
  // Show instructions
  const confirmMsg = `To share with all users without login, you must publish this sheet as CSV.\n\n1. Open this file in Google Sheets:\nhttps://docs.google.com/spreadsheets/d/${fileId}\n2. Click File → Share → Publish to web\n3. Choose "Comma-separated values (.csv)"\n4. Click Publish\n5. Copy the generated URL (it will look like https://docs.google.com/spreadsheets/d/e/.../pub?output=csv)\n\nAfter publishing, paste that URL below.\n\n(Alternatively, use the CSV export link above, but it requires the file to be shared with "Anyone with the link can view".)`;
  const publishedUrl = prompt(confirmMsg, publicCsvUrl);
  if (publishedUrl && publishedUrl.trim()) {
    document.getElementById('public-url').value = publishedUrl.trim();
    saveSharedUrl();
  }
}

function saveSharedUrl() {
  const url = document.getElementById('public-url').value.trim();
  if (!url) { toast('Enter a valid URL', 'err'); return; }
  save(K.SHARED, url);
  toast('Shared source saved. Users can now sync.', 'info');
  document.getElementById('shared-status').innerHTML = '<div class="st-ok">✅ Shared URL saved.</div>';
  setTimeout(() => document.getElementById('shared-status').innerHTML = '', 3000);
}

// ========== SYNC FOR USERS ==========
async function syncFromSharedUrl(showToast = true) {
  const url = getSharedUrl();
  if (!url) {
    if (showToast) toast('No shared roster URL set by admin.', 'err');
    return;
  }
  const el = document.getElementById('imp-status'); // reuse status box
  if (el) { el.className = 'status-box st-load'; el.innerHTML = '<span class="spinner"></span> Fetching roster from shared link...'; }
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const csvText = await response.text();
    // Parse CSV into rows
    const rows = parseCSV(csvText);
    if (rows.length < 2) throw new Error('CSV has no data rows.');
    // The first row is header
    const headerRow = rows[0];
    const dataRows = rows.slice(1);
    // We need to guess roster type from URL or ask user? For simplicity, assume admin sets type in settings.
    // But we can let the user pick? Better: admin also saves the roster type along with URL.
    let type = 'obs'; // default
    // Try to detect from URL: "obs", "fore", "sdm"
    if (url.includes('observer')) type = 'obs';
    else if (url.includes('forecaster')) type = 'fore';
    else if (url.includes('sdm')) type = 'sdm';
    else {
      type = prompt('Which roster type is this? (obs/fore/sdm)', 'obs');
      if (!['obs','fore','sdm'].includes(type)) type = 'obs';
    }
    const monthName = prompt('Month name (e.g., Jestha 2083):', '');
    if (!monthName) throw new Error('Month name required');
    const nepaliName = prompt('Nepali name (optional):', '');
    const headerRowIdx = 0; // CSV first row is header
    const result = parseSheetRows(rows, headerRowIdx, type);
    if (result.error) throw new Error(result.error);
    // Commit to local storage
    commitRoster(result, type, monthName, nepaliName, url);
    if (el) { el.className = 'status-box st-ok'; el.innerHTML = `✅ Synced ${result.days.length} days for ${monthName}`; setTimeout(() => el.innerHTML = '', 4000); }
    if (showToast) toast(`Roster updated: ${monthName}`, 'info');
    // Refresh UI
    if (document.getElementById('s-app').classList.contains('active')) {
      fillMonthDrops(); renderMine(); renderCal(); renderToday(); renderArchive();
    }
  } catch (err) {
    if (el) { el.className = 'status-box st-err'; el.innerHTML = `❌ Sync failed: ${err.message}`; }
    toast('Sync failed: ' + err.message, 'err');
  }
}

// Simple CSV parser (handles quoted fields)
function parseCSV(text) {
  const rows = [];
  const regex = /(?:,|\n|^)("(?:(?:"")*[^"]*)*"|[^",\n]*|(?:\n|$))/g;
  let match;
  let row = [];
  while ((match = regex.exec(text)) !== null) {
    let value = match[1];
    if (value.startsWith('"') && value.endsWith('"')) value = value.slice(1, -1).replace(/""/g, '"');
    row.push(value);
    if (text[match.index + match[0].length] === '\n') {
      rows.push(row);
      row = [];
    }
  }
  if (row.length) rows.push(row);
  return rows;
}

// ========== PARSER (exactly the same as before) ==========
const SKIP_COLS = new Set(['day','date','iso','gate','no','sn','#','s.n','sr.no','remarks','remark','note','notes','total','leave','incharge','check','weekly','shift','code','gates','वार','गते','स्न']);
function isSkipCol(label) {
  if (!label) return true;
  const l = label.toString().trim().toLowerCase();
  if (/^\d+$/.test(l)) return true;
  return SKIP_COLS.has(l);
}
function parseSheetRows(rows, headerRowIdx, type) {
  if (!rows || rows.length <= headerRowIdx) return { error: 'No data after header row' };
  const headerRow = rows[headerRowIdx];
  let colDay = -1, colGate = -1, colISO = -1;
  const staffCols = [];
  headerRow.forEach((h, i) => {
    if (!h) return;
    const hs = h.toString().trim();
    const hl = hs.toLowerCase();
    if (colDay < 0 && (hl === 'day' || hl === 'वार' || hl === 'bar')) colDay = i;
    else if (colGate < 0 && (hl.includes('गते') || hl === 'date' || hl === 'no' || hl === 's.n' || hl === 'sn' || hl === '#')) colGate = i;
    else if (colISO < 0 && (hl.includes('iso') || hl.includes('yyyy') || hl.includes('-mm-'))) colISO = i;
    else if (!isSkipCol(hs)) staffCols.push({ name: hs, col: i });
  });
  if (colDay < 0) colDay = 0;
  if (colGate < 0) colGate = 1;
  if (!staffCols.length) return { error: 'No staff columns found. Check header row.' };
  const days = [];
  let startDate = '';
  const WEEKDAYS_NP = { आइत: 'Sun', सोम: 'Mon', मंगल: 'Tue', बुध: 'Wed', बिहि: 'Thu', शुक्र: 'Fri', शनि: 'Sat' };
  for (let ri = headerRowIdx + 1; ri < rows.length; ri++) {
    const row = rows[ri];
    if (!row || row.every(c => !c || String(c).trim() === '')) continue;
    const rawGate = row[colGate];
    if (rawGate === undefined || rawGate === null || String(rawGate).trim() === '') continue;
    const gateNum = parseInt(String(rawGate).trim());
    if (isNaN(gateNum) || gateNum < 1 || gateNum > 32) continue;
    let dayName = colDay >= 0 ? String(row[colDay] || '').trim() : '';
    if (WEEKDAYS_NP[dayName]) dayName = WEEKDAYS_NP[dayName];
    let iso = '';
    if (colISO >= 0 && row[colISO]) {
      let raw = String(row[colISO]).trim();
      if (raw.match(/^\d{4}-\d{2}-\d{2}/)) iso = raw.slice(0, 10);
      else {
        const n = parseFloat(raw);
        if (!isNaN(n) && n > 40000) {
          const d = new Date((n - 25569) * 86400 * 1000);
          iso = d.toISOString().split('T')[0];
        } else {
          const d = new Date(raw);
          if (!isNaN(d.getTime())) iso = d.toISOString().split('T')[0];
        }
      }
    }
    if (iso && !startDate) startDate = iso;
    const duties = {};
    staffCols.forEach(sc => {
      const val = row[sc.col] === undefined || row[sc.col] === null ? 'xx' : String(row[sc.col]).trim() || 'xx';
      duties[sc.name] = val;
    });
    days.push({ date: gateNum, isoDate: iso, day: dayName, duties });
  }
  if (!days.length) return { error: 'No valid duty rows found.' };
  return { days, staffNames: staffCols.map(s => s.name), startDate };
}

function commitRoster(result, type, mname, mnepali, source) {
  const id = type + '-' + mname.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  const r = getRoster();
  r[type] = r[type] || [];
  const existingIdx = r[type].findIndex(m => m.id === id);
  const newMonth = { id, name: mname, nepali: mnepali, type, startDate: result.startDate, days: result.days, importedAt: new Date().toISOString(), source };
  if (existingIdx >= 0) r[type][existingIdx] = newMonth;
  else r[type].push(newMonth);
  saveRoster(r);
  // Merge staff
  const s = getStaff();
  s[type] = s[type] || [];
  result.staffNames.forEach(n => { if (n && !s[type].includes(n)) s[type].push(n); });
  saveStaff(s);
  // Update UI if needed
  if (currentRole === type) { fillMonthDrops(); renderMine(); renderCal(); renderToday(); renderArchive(); }
}
